name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: onco-cluster
  ECR_REGISTRY: 455254973218.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - agents-service
          - backend-gateway
          - frontend
          - langraph-orchestrator
          - rag-service
          - tools-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Docker Image
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/cancer-agent-${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/cancer-agent-${{ matrix.service }}:latest \
            ./${{ matrix.service }}
          
          docker push ${{ env.ECR_REGISTRY }}/cancer-agent-${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/cancer-agent-${{ matrix.service }}:latest

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Update Manifests with Git SHA
        run: |
          sed -i "s|${{ env.ECR_REGISTRY }}/cancer-agent-\(.*\):latest|${{ env.ECR_REGISTRY }}/cancer-agent-\1:${{ github.sha }}|g" kubernetes/*-deployment.yaml

      - name: Deploy Manifests
        run: |
          kubectl apply -f kubernetes/

      - name: Verify Deployments
        run: |
          kubectl rollout status deployment/frontend --timeout=300s
          kubectl rollout status deployment/backend-gateway --timeout=300s
          kubectl rollout status deployment/agents-service --timeout=300s
          kubectl rollout status deployment/langraph-orchestrator --timeout=300s
          kubectl rollout status deployment/rag-service --timeout=300s
          kubectl rollout status deployment/tools-service --timeout=300s
