apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../docker-compose.yml
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: agents-service
  name: agents-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: agents-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker-compose.yml
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: agents-service
    spec:
      containers:
        - env:
            - name: OPENAI_API_KEY
              value: "YOUR_OPENAI_API_KEY_HERE"
            - name: TOOLS_SERVICE_URL
              value: http://tools-service:8003
          image: 455254973218.dkr.ecr.us-east-1.amazonaws.com/cancer-agent-agents-service:latest
          imagePullPolicy: Always
          name: onco-agents-service
          ports:
            - containerPort: 8002
              protocol: TCP
      restartPolicy: Always
