apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../docker-compose.yml
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: frontend
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: frontend
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker-compose.yml
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: frontend
    spec:
      containers:
        - image: 455254973218.dkr.ecr.us-east-1.amazonaws.com/cancer-agent-frontend:latest
          imagePullPolicy: Always
          name: onco-frontend
          ports:
            - containerPort: 3000
              protocol: TCP
      restartPolicy: Always
