apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f ../docker-compose.yml
    kompose.version: 1.38.0 (HEAD)
  labels:
    io.kompose.service: tools-service
  name: tools-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: tools-service
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f ../docker-compose.yml
        kompose.version: 1.38.0 (HEAD)
      labels:
        io.kompose.service: tools-service
    spec:
      containers:
        - env:
            - name: RAG_SERVICE_URL
              value: http://rag-service:8004
          image: cancer-agent-tools-service
          imagePullPolicy: Never
          name: onco-tools-service
          ports:
            - containerPort: 8003
              protocol: TCP
      restartPolicy: Always
